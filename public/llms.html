<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLM docs — Gemini Enterprise API Explorer</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .llms-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky;
    top: 0;
  }
  .llms-toolbar h1 { margin: 0; font-size: 16px; }
  .llms-toolbar h1 span { color: var(--accent); font-weight: 400; }
  .llms-toolbar .actions { display: flex; gap: 8px; }
  #llms-content {
    max-width: 880px;
    margin: 0 auto;
    padding: 24px 28px 60px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>
</head>
<body>
<div class="llms-toolbar">
  <h1>Gemini Enterprise <span>LLM docs</span></h1>
  <div class="actions">
    <a class="header-btn" href="llms.txt" download="llms.txt">Download llms.txt</a>
    <a class="header-btn" href="index.html">← Back to explorer</a>
  </div>
</div>
<pre id="llms-content">Loading…</pre>
<script>
  fetch('llms.txt')
    .then((r) => (r.ok ? r.text() : Promise.reject(new Error('HTTP ' + r.status))))
    .then((text) => { document.getElementById('llms-content').textContent = text; })
    .catch((e) => { document.getElementById('llms-content').textContent = 'Failed to load llms.txt: ' + e.message; });
</script>
</body>
</html>
